name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t app:latest .

      - name: Stop Old Container
        run: |
          docker stop app || true
          docker rm app || true

      - name: Run Container
        run: |
          docker run -d -p 3000:3000 \
            -e VERSION=v3 \
            -e DATA_SOURCE=staging \
            --name app app:latest

      - name: Fake Success
        run: echo "Deployment successful"
